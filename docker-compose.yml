services:
  db:
    image: postgres:17
    ports:
      - "5432:5432"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
        - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Check that database is ready before starting dependent services
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 20s
      retries: 5

  web:
    build: .
    ports:
    - "5000:5000"  
    env_file: 
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy  # Wait until DB is ready before starting app
 
volumes:
  pgdata: