services:
  db:
    image: postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
        - pgdata:/var/lib/postgresql/data

  web:
    build: .
    ports:
    - "5000:5000"  
    env_file: 
      - .env
    #environment:
      #- DATABASE_URL=${DATABASE_URL}
    volumes:
      - .:/app
    depends_on:
      - db
 
volumes:
  pgdata: