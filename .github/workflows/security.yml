name: Security CI Pipeline

# Run pipeline automatically on every push to main branch
on:
  push:
    branches:
      - main

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      # Checkout repository code
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history needed for accurate analysis
      - name: SAST - SonarQube
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # Authentication token
          SONAR_HOST_URL: https://sonarcloud.io   # Using SonarCloud service

  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: SCA - Snyk
        uses: snyk/actions/python@9adf32b1121593767fc3c057af55b55db032dc04
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} # Token for vulnerability database access

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Build Docker image for container scanning
      - name: Build Docker image
        run: docker build -t password-manager:${{ github.sha }} .

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          format: json
          exit-code: 0
          output: trivyfs.json

      # Upload filesystem scan results for later review
      - name: Upload Trivy file scan results as artifact
        uses: actions/upload-artifact@v6
        with:
          name: trivy-file-scan-results
          path: trivyfs.json
      
      - name: Trivy container scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: image
          image-ref: 'password-manager:${{ github.sha }}'
          format: json
          exit-code: 0
          output: trivyimage.json

      - name: Upload Trivy image scan results as artifact
        uses: actions/upload-artifact@v6
        with:
          name: trivy-image-scan-results
          path: trivyimage.json
  
  cyclonedx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate SBOM
        uses: CycloneDX/gh-python-generate-sbom@v2
        with:
          input: ./requirements.txt
          output: ./bom.json
          format: json
      
      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: bom.json